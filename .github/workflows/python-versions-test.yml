name: Python versions test
on:
  [push, workflow_dispatch]

jobs:
  test_python_versions:
    name: Python versions test
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.6", "3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Setup Python ${{ matrix.python }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python }}

    - name: Checkout Last Commit
      uses: actions/checkout@v6

    - name: Run Test Scenario
      env:
        UNIVERSUM_NOX_REGRESSION: true
      run: |
        python${{ matrix.python }} -m venv vu${{ matrix.python }}
        . ./vu${{ matrix.python }}/bin/activate
        python --version
        echo "::group::Make Smages"
        make rebuild
        echo "::endgroup::"
        pip install .[test]
        echo "::group::Run Tests"
        make test && mv junit_results.xml junit_results_${{ matrix.python }}.xml
        echo "::endgroup::"

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        name: Test results for Python ${{ matrix.python }}
        files: ./junit_results_${{ matrix.python }}.xml
